    <!-- Modal Input untuk Excel Export -->
    <div
      class="modal fade"
      id="inputModal"
      tabindex="-1"
      aria-labelledby="inputModalLabel"
      data-bs-backdrop="static"
    >
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="inputModalLabel">Filter Data Export</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="exportForm">
              <div class="pdc-form-group border rounded p-3 mb-3">
                <!-- PDC Selection -->
                <!-- Form PDC utama -->
                <div class="mb-3">
                  <label class="form-label">Nama PDC</label>
                  <div class="position-relative">
                    <input
                      id="pdcInput"
                      type="text"
                      class="form-control"
                      placeholder="Ketik atau pilih nama PDC..."
                    />
                    <div
                      id="pdcSuggestions"
                      class="suggestion-dropdown d-none"
                    ></div>
                  </div>
                  <div
                    class="selected-pdc-display mt-2 text-muted small"
                    style="display: none"
                  ></div>
                </div>

                <!-- Form Vehicle utama -->
                <div class="mb-3">
                  <label class="form-label">Kendaraan</label>
                  <div class="position-relative">
                    <input
                      id="vehicleInput"
                      type="text"
                      class="form-control"
                      placeholder="Ketik atau pilih nama kendaraan..."
                    />
                    <div
                      id="vehicleSuggestions"
                      class="suggestion-dropdown d-none"
                    ></div>
                  </div>
                  <div id="vehicleTags" class="mt-2"></div>
                </div>
              </div>

              <!-- Container untuk form PDC tambahan -->
              <div id="pdcFormsContainer"></div>

              <!-- Tombol add (sekarang untuk menambah form PDC) -->
              <button type="button" id="addVehicleBtn" class="btn btn-primary">
                Tambah PDC Baru
              </button>

              <!-- Action Buttons -->
              <div class="d-flex justify-content-end gap-2">
                <button
                  type="button"
                  class="btn btn-secondary"
                  data-bs-dismiss="modal"
                >
                  Batal
                </button>
                <button type="submit" class="btn btn-primary">
                  <i class="bi bi-download me-1"></i>Export
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Loading -->
    <div
      class="modal fade"
      id="loadingModal"
      tabindex="-1"
      aria-labelledby="loadingModalLabel"
      inert
      data-bs-backdrop="static"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-body p-5">
            <div class="align-content-center text-center">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
              <p class="mt-4" id="loadingText">Memproses data...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- modals end -->

    <!-- Toast Notification -->
    <div
      id="toast"
      class="toast align-items-center text-bg-primary border-0 position-fixed bottom-0 end-0 m-3"
      role="alert"
      aria-live="assertive"
      aria-atomic="true"
      style="display: none; z-index: 1080"
    >
      <div class="d-flex">
        <div class="toast-body" id="toast-message"></div>
        <button
          type="button"
          class="btn-close btn-close-white me-2 m-auto"
          aria-label="Close"
        ></button>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>

      src="https://pdc-jkind.github.io/list_code_pdc/script/export.js"
    ></script>

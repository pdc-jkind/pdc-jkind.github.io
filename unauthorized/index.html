<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unauthorized - Access Denied</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="../public/img/favicon.ico"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <!-- Background Elements -->
    <div class="absolute inset-0 overflow-hidden">
      <!-- Large bubbles -->
      <div
        class="absolute -top-40 -right-40 w-80 h-80 rounded-full bg-white opacity-10 floating-animation"
      ></div>
      <div
        class="absolute -bottom-40 -left-40 w-96 h-96 rounded-full bg-white opacity-5 floating-animation"
        style="animation-delay: -3s"
      ></div>
      <div
        class="absolute top-1/4 left-1/4 w-64 h-64 rounded-full bg-white opacity-5 floating-animation"
        style="animation-delay: -1.5s"
      ></div>

      <!-- Medium bubbles -->
      <div
        class="absolute top-10 left-1/3 w-48 h-48 rounded-full bg-white opacity-8 floating-animation"
        style="animation-delay: -2s"
      ></div>
      <div
        class="absolute bottom-20 right-1/4 w-56 h-56 rounded-full bg-white opacity-6 floating-animation"
        style="animation-delay: -4s"
      ></div>
      <div
        class="absolute top-1/2 -left-20 w-40 h-40 rounded-full bg-white opacity-7 floating-animation"
        style="animation-delay: -1s"
      ></div>
      <div
        class="absolute top-3/4 right-10 w-44 h-44 rounded-full bg-white opacity-5 floating-animation"
        style="animation-delay: -2.5s"
      ></div>

      <!-- Small bubbles -->
      <div
        class="absolute top-1/6 right-1/3 w-24 h-24 rounded-full bg-white opacity-12 floating-animation"
        style="animation-delay: -0.5s"
      ></div>
      <div
        class="absolute bottom-1/3 left-1/6 w-32 h-32 rounded-full bg-white opacity-8 floating-animation"
        style="animation-delay: -3.5s"
      ></div>
      <div
        class="absolute top-2/3 left-1/2 w-20 h-20 rounded-full bg-white opacity-10 floating-animation"
        style="animation-delay: -1.8s"
      ></div>
      <div
        class="absolute bottom-1/6 right-1/6 w-28 h-28 rounded-full bg-white opacity-6 floating-animation"
        style="animation-delay: -4.2s"
      ></div>

      <!-- Tiny bubbles -->
      <div
        class="absolute top-1/5 left-1/12 w-16 h-16 rounded-full bg-white opacity-15 floating-animation"
        style="animation-delay: -0.8s"
      ></div>
      <div
        class="absolute top-3/5 right-1/12 w-12 h-12 rounded-full bg-white opacity-18 floating-animation"
        style="animation-delay: -2.2s"
      ></div>
      <div
        class="absolute bottom-1/4 left-2/3 w-18 h-18 rounded-full bg-white opacity-12 floating-animation"
        style="animation-delay: -3.8s"
      ></div>
      <div
        class="absolute top-1/8 right-2/5 w-14 h-14 rounded-full bg-white opacity-16 floating-animation"
        style="animation-delay: -1.2s"
      ></div>
      <div
        class="absolute bottom-3/5 left-1/5 w-22 h-22 rounded-full bg-white opacity-9 floating-animation"
        style="animation-delay: -4.5s"
      ></div>
      <div
        class="absolute top-4/5 right-3/5 w-10 h-10 rounded-full bg-white opacity-20 floating-animation"
        style="animation-delay: -0.3s"
      ></div>

      <!-- Extra tiny decorative bubbles -->
      <div
        class="absolute top-1/12 left-3/4 w-8 h-8 rounded-full bg-white opacity-25 floating-animation"
        style="animation-delay: -1.7s"
      ></div>
      <div
        class="absolute bottom-1/12 right-4/5 w-6 h-6 rounded-full bg-white opacity-30 floating-animation"
        style="animation-delay: -3.3s"
      ></div>
      <div
        class="absolute top-5/6 left-1/8 w-9 h-9 rounded-full bg-white opacity-22 floating-animation"
        style="animation-delay: -2.8s"
      ></div>
      <div
        class="absolute bottom-2/3 right-1/8 w-7 h-7 rounded-full bg-white opacity-28 floating-animation"
        style="animation-delay: -0.1s"
      ></div>
    </div>

    <!-- Main Unauthorized Card -->
    <div
      class="glass-effect rounded-3xl p-8 w-full max-w-md relative z-10 hover-scale"
    >
      <!-- Lock Icon -->
      <div class="text-center mb-8">
        <div
          class="w-20 h-20 bg-red-100 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg pulse-animation"
        >
          <svg
            class="w-10 h-10 text-red-600"
            fill="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"
            />
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-white mb-2">Akses Ditolak</h1>
        <p class="text-white/80 text-sm mb-4">
          Belum mendapatkan akses, silahkan hubungi developer
        </p>
        <div class="w-16 h-1 bg-red-400 mx-auto rounded-full"></div>
      </div>

      <!-- Action Buttons -->
      <div class="space-y-4">
        <!-- Contact Developer Button -->
        <button
          class="contact-btn w-full py-4 px-6 rounded-2xl font-semibold flex items-center justify-center space-x-3 group"
          onclick="contactDeveloper()"
        >
          <svg
            class="w-6 h-6 text-white"
            fill="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"
            />
          </svg>
          <span>Hubungi Developer</span>
          <svg
            class="w-5 h-5 group-hover:translate-x-1 transition-transform"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 5l7 7-7 7"
            />
          </svg>
        </button>

        <!-- WhatsApp Button -->
        <button
          class="whatsapp-btn w-full py-4 px-6 rounded-2xl font-semibold flex items-center justify-center space-x-3 group"
          onclick="contactWhatsApp()"
        >
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0020.465 3.516"
            />
          </svg>
          <span>WhatsApp Developer</span>
          <svg
            class="w-5 h-5 group-hover:translate-x-1 transition-transform"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"
            />
          </svg>
        </button>

        <!-- Divider -->
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-white/20"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-transparent text-white/60">atau</span>
          </div>
        </div>

        <!-- Back to Login Button -->
        <button
          class="back-btn w-full py-3 px-6 rounded-2xl font-medium flex items-center justify-center space-x-3 group glass-effect border border-white/20"
          onclick="backToLogin()"
        >
          <svg
            class="w-5 h-5 group-hover:-translate-x-1 transition-transform"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 19l-7-7 7-7"
            />
          </svg>
          <span class="text-white/90">Kembali ke Login</span>
        </button>
      </div>

      <!-- Additional Info -->
      <div class="mt-8 text-center">
        <div class="bg-white/10 rounded-xl p-4 mb-4">
          <div class="flex items-start space-x-3">
            <svg
              class="w-5 h-5 text-yellow-300 mt-1 flex-shrink-0"
              fill="currentColor"
              viewBox="0 0 20 20"
            >
              <path
                fill-rule="evenodd"
                d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"
                clip-rule="evenodd"
              ></path>
            </svg>
            <div class="text-left">
              <p class="text-white/90 text-sm font-medium">Informasi Penting</p>
              <p class="text-white/70 text-xs mt-1">
                Pastikan Anda memiliki izin akses sebelum menggunakan aplikasi
                ini.
              </p>
            </div>
          </div>
        </div>

        <p class="text-white/60 text-xs">
          Butuh bantuan? Silahkan hubungi tim developer melalui kontak yang
          tersedia di atas.
        </p>
      </div>
    </div>

    <!-- Powered by JKIND - Bottom Right -->
    <div class="fixed bottom-4 right-4 z-20">
      <div
        class="flex items-center space-x-2 glass-effect px-4 py-2 rounded-full hover-scale"
      >
        <span class="text-white/70 text-sm font-medium">Powered by</span>
        <img
          src="../public/img/jkind.png"
          alt="JKIND"
          class="h-6 w-auto filter brightness-0 invert opacity-80 hover:opacity-100 transition-opacity duration-300"
        />
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>

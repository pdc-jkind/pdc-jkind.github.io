<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verifikasi Autentikasi - Please Wait</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="../public/img/favicon.ico"
      type="image/x-icon"
    />
    <style>
      /* Custom CSS Styles */
      body {
        font-family: "Inter", sans-serif;
      }

      .gradient-bg {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      .glass-effect {
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.18);
      }

      .floating-animation {
        animation: float 6s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px) translateX(0px) rotate(0deg);
        }
        25% {
          transform: translateY(-15px) translateX(10px) rotate(2deg);
        }
        50% {
          transform: translateY(-25px) translateX(-5px) rotate(-1deg);
        }
        75% {
          transform: translateY(-10px) translateX(-8px) rotate(1deg);
        }
      }

      .hover-scale {
        transition: all 0.3s ease;
      }

      .pulse-animation {
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.05);
          opacity: 0.8;
        }
      }

      .loading-spinner {
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .fade-in {
        animation: fadeIn 0.8s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .dots-animation::after {
        content: "";
        animation: dots 1.5s steps(4, end) infinite;
      }

      @keyframes dots {
        0%,
        20% {
          content: "";
        }
        40% {
          content: ".";
        }
        60% {
          content: "..";
        }
        80%,
        100% {
          content: "...";
        }
      }

      /* Responsive adjustments */
      @media (max-width: 640px) {
        .floating-animation {
          animation-duration: 8s;
        }

        .glass-effect {
          backdrop-filter: blur(8px);
        }
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.3);
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.5);
      }
    </style>
  </head>
  <body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <!-- Background Elements -->
    <div class="absolute inset-0 overflow-hidden">
      <!-- Large bubbles -->
      <div
        class="absolute -top-40 -right-40 w-80 h-80 rounded-full bg-white opacity-10 floating-animation"
      ></div>
      <div
        class="absolute -bottom-40 -left-40 w-96 h-96 rounded-full bg-white opacity-5 floating-animation"
        style="animation-delay: -3s"
      ></div>
      <div
        class="absolute top-1/4 left-1/4 w-64 h-64 rounded-full bg-white opacity-5 floating-animation"
        style="animation-delay: -1.5s"
      ></div>

      <!-- Medium bubbles -->
      <div
        class="absolute top-10 left-1/3 w-48 h-48 rounded-full bg-white opacity-8 floating-animation"
        style="animation-delay: -2s"
      ></div>
      <div
        class="absolute bottom-20 right-1/4 w-56 h-56 rounded-full bg-white opacity-6 floating-animation"
        style="animation-delay: -4s"
      ></div>
      <div
        class="absolute top-1/2 -left-20 w-40 h-40 rounded-full bg-white opacity-7 floating-animation"
        style="animation-delay: -1s"
      ></div>
      <div
        class="absolute top-3/4 right-10 w-44 h-44 rounded-full bg-white opacity-5 floating-animation"
        style="animation-delay: -2.5s"
      ></div>

      <!-- Small bubbles -->
      <div
        class="absolute top-1/6 right-1/3 w-24 h-24 rounded-full bg-white opacity-12 floating-animation"
        style="animation-delay: -0.5s"
      ></div>
      <div
        class="absolute bottom-1/3 left-1/6 w-32 h-32 rounded-full bg-white opacity-8 floating-animation"
        style="animation-delay: -3.5s"
      ></div>
      <div
        class="absolute top-2/3 left-1/2 w-20 h-20 rounded-full bg-white opacity-10 floating-animation"
        style="animation-delay: -1.8s"
      ></div>
      <div
        class="absolute bottom-1/6 right-1/6 w-28 h-28 rounded-full bg-white opacity-6 floating-animation"
        style="animation-delay: -4.2s"
      ></div>

      <!-- Tiny bubbles -->
      <div
        class="absolute top-1/5 left-1/12 w-16 h-16 rounded-full bg-white opacity-15 floating-animation"
        style="animation-delay: -0.8s"
      ></div>
      <div
        class="absolute top-3/5 right-1/12 w-12 h-12 rounded-full bg-white opacity-18 floating-animation"
        style="animation-delay: -2.2s"
      ></div>
      <div
        class="absolute bottom-1/4 left-2/3 w-18 h-18 rounded-full bg-white opacity-12 floating-animation"
        style="animation-delay: -3.8s"
      ></div>
      <div
        class="absolute top-1/8 right-2/5 w-14 h-14 rounded-full bg-white opacity-16 floating-animation"
        style="animation-delay: -1.2s"
      ></div>
      <div
        class="absolute bottom-3/5 left-1/5 w-22 h-22 rounded-full bg-white opacity-9 floating-animation"
        style="animation-delay: -4.5s"
      ></div>
      <div
        class="absolute top-4/5 right-3/5 w-10 h-10 rounded-full bg-white opacity-20 floating-animation"
        style="animation-delay: -0.3s"
      ></div>

      <!-- Extra tiny decorative bubbles -->
      <div
        class="absolute top-1/12 left-3/4 w-8 h-8 rounded-full bg-white opacity-25 floating-animation"
        style="animation-delay: -1.7s"
      ></div>
      <div
        class="absolute bottom-1/12 right-4/5 w-6 h-6 rounded-full bg-white opacity-30 floating-animation"
        style="animation-delay: -3.3s"
      ></div>
      <div
        class="absolute top-5/6 left-1/8 w-9 h-9 rounded-full bg-white opacity-22 floating-animation"
        style="animation-delay: -2.8s"
      ></div>
      <div
        class="absolute bottom-2/3 right-1/8 w-7 h-7 rounded-full bg-white opacity-28 floating-animation"
        style="animation-delay: -0.1s"
      ></div>
    </div>

    <!-- Main Authentication Checking Card -->
    <div
      class="glass-effect rounded-3xl p-8 w-full max-w-md relative z-10 fade-in"
    >
      <!-- Logo/Icon -->
      <div class="text-center mb-8">
        <div
          class="w-20 h-20 bg-white rounded-2xl mx-auto p-1 mb-4 flex items-center justify-center shadow-lg pulse-animation"
        >
          <img src="../public/img/icon.png" alt="icon" />
        </div>
        <h1 class="text-3xl font-bold text-white mb-2">Memverifikasi Akses</h1>
        <p class="text-white/80 text-sm">
          Mohon tunggu, kami sedang memeriksa kredensial Anda
        </p>
      </div>

      <!-- Loading Animation -->
      <div class="space-y-6">
        <!-- Loading Spinner -->
        <div class="flex justify-center mb-6">
          <div
            class="loading-spinner w-12 h-12 border-4 border-white/20 border-t-white rounded-full"
          ></div>
        </div>

        <!-- Status Message -->
        <div class="text-center">
          <p class="text-white/90 text-lg font-medium mb-2">
            <span class="dots-animation">Memeriksa sesi Anda</span>
          </p>
          <p class="text-white/60 text-sm">
            Proses ini hanya membutuhkan beberapa detik
          </p>
        </div>

        <!-- Progress Steps -->
        <div class="space-y-3 mt-6">
          <div class="flex items-center space-x-3 text-white/70">
            <div class="w-2 h-2 bg-white rounded-full animate-pulse"></div>
            <span class="text-sm">Mengecek token autentikasi...</span>
          </div>
          <div class="flex items-center space-x-3 text-white/70">
            <div
              class="w-2 h-2 bg-white/50 rounded-full animate-pulse"
              style="animation-delay: 0.5s"
            ></div>
            <span class="text-sm">Memvalidasi peran pengguna...</span>
          </div>
          <div class="flex items-center space-x-3 text-white/70">
            <div
              class="w-2 h-2 bg-white/30 rounded-full animate-pulse"
              style="animation-delay: 1s"
            ></div>
            <span class="text-sm">Mengarahkan ke halaman yang sesuai...</span>
          </div>
        </div>

        <!-- Alternative Manual Navigation (Hidden by default) -->
        <div id="manual-nav" class="hidden mt-8 pt-6 border-t border-white/20">
          <p class="text-white/60 text-xs text-center mb-4">
            Proses memakan waktu terlalu lama?
          </p>
          <div class="flex space-x-3">
            <button
              onclick="window.location.href='/login'"
              class="flex-1 glass-effect border border-white/20 py-2 px-4 rounded-xl text-white/80 hover:text-white hover:bg-white/10 transition-all duration-300 text-sm"
            >
              Kembali ke Login
            </button>
            <button
              onclick="location.reload()"
              class="flex-1 glass-effect border border-white/20 py-2 px-4 rounded-xl text-white/80 hover:text-white hover:bg-white/10 transition-all duration-300 text-sm"
            >
              Refresh Halaman
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Powered by JKIND - Bottom Right -->
    <div class="fixed bottom-4 right-4 z-20">
      <div
        class="flex items-center space-x-2 glass-effect px-4 py-2 rounded-full pulse-animation"
      >
        <span class="text-white/70 text-sm font-medium">Powered by</span>
        <img
          src="../public/img/jkind.png"
          alt="JKIND"
          class="h-6 w-auto filter brightness-0 invert opacity-80 hover:opacity-100 transition-opacity duration-300"
        />
      </div>
    </div>

    <script>
      // Enhanced authentication checking with better UX
      let checkingSteps = 0;
      const maxSteps = 3;
      const stepDelay = 800; // milliseconds

      // Show manual navigation after 10 seconds
      setTimeout(() => {
        document.getElementById("manual-nav").classList.remove("hidden");
      }, 10000);

      // Simulate step-by-step checking process
      function simulateCheckingSteps() {
        const steps = document.querySelectorAll(".flex.items-center.space-x-3");

        const stepInterval = setInterval(() => {
          if (checkingSteps < steps.length) {
            // Update current step
            const currentStep = steps[checkingSteps];
            const dot = currentStep.querySelector(".w-2.h-2");
            const text = currentStep.querySelector("span");

            // Highlight current step
            dot.classList.remove("bg-white/30", "bg-white/50");
            dot.classList.add("bg-green-400");
            text.classList.add("text-white");

            // Add checkmark after completion
            setTimeout(() => {
              dot.innerHTML =
                '<svg class="w-2 h-2 text-green-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>';
              dot.classList.remove("animate-pulse");
            }, stepDelay / 2);

            checkingSteps++;
          } else {
            clearInterval(stepInterval);
            // Start actual authentication check after visual simulation
            setTimeout(performAuthCheck, 500);
          }
        }, stepDelay);
      }

      // Actual authentication logic
      function performAuthCheck() {
        try {
          // Get user data from localStorage
          const userRole = localStorage.getItem("userRole");
          const userSession = localStorage.getItem("sessionToken");
          const userEmail = localStorage.getItem("userEmail");
          const userName = localStorage.getItem("userName");
          const userPhoto = localStorage.getItem("userPhoto");

          console.log("Checking authentication...", {
            userRole,
            userSession: userSession ? "***" : null,
            userEmail,
            userName,
          });

          // Validation and redirect logic
          if (!userRole || !userSession) {
            console.log("No valid session found, redirecting to login...");
            showRedirectMessage(
              "Sesi tidak ditemukan, mengarahkan ke halaman login...",
              "/login"
            );
          } else {
            const allowedRoles = ["admin", "contributor", "monitor"];
            if (allowedRoles.includes(userRole)) {
              console.log("Valid role found, redirecting to dashboard...");
              showRedirectMessage(
                `Selamat datang ${
                  userName || userEmail
                }! Mengarahkan ke dashboard...`,
                "/dashboard"
              );
            } else {
              console.log(
                "Unauthorized role, redirecting to unauthorized page..."
              );
              showRedirectMessage(
                "Akses ditolak, Anda tidak memiliki izin...",
                "/unauthorized"
              );
            }
          }
        } catch (error) {
          console.error("Error during authentication check:", error);
          showRedirectMessage(
            "Terjadi kesalahan, mengarahkan ke halaman login...",
            "/login"
          );
        }
      }

      // Show redirect message and perform redirect
      function showRedirectMessage(message, redirectUrl) {
        const statusMessage = document.querySelector(".text-white\\/90");
        const subMessage = document.querySelector(".text-white\\/60");

        statusMessage.innerHTML = message;
        subMessage.innerHTML =
          'Mengalihkan dalam <span id="countdown">3</span> detik...';

        // Countdown
        let countdown = 3;
        const countdownEl = document.getElementById("countdown");
        const countdownInterval = setInterval(() => {
          countdown--;
          if (countdownEl) countdownEl.textContent = countdown;

          if (countdown <= 0) {
            clearInterval(countdownInterval);
            window.location.href = redirectUrl;
          }
        }, 1000);
      }

      // Initialize page
      document.addEventListener("DOMContentLoaded", function () {
        // Start the checking simulation
        setTimeout(simulateCheckingSteps, 1000);

        // Add page load animation
        document.body.style.opacity = "0";
        document.body.style.transform = "translateY(20px)";
        document.body.style.transition = "all 0.6s ease";

        setTimeout(() => {
          document.body.style.opacity = "1";
          document.body.style.transform = "translateY(0)";
        }, 100);

        // Console welcome message
        console.log(
          "%c🔐 Authentication Check in Progress...",
          "color: #667eea; font-size: 16px; font-weight: bold;"
        );
        console.log(
          "%cBuilt with ❤️ by Ryan Dev",
          "color: #764ba2; font-size: 12px;"
        );
      });

      // Handle window resize for responsive adjustments
      window.addEventListener("resize", function () {
        const isMobile = window.innerWidth < 768;
        const bubbles = document.querySelectorAll(".floating-animation");

        bubbles.forEach((bubble) => {
          if (isMobile) {
            bubble.style.animationDuration = "8s";
          } else {
            bubble.style.animationDuration = "6s";
          }
        });
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Welcome Back</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="../public/img/favicon.ico"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <!-- Background Elements -->
    <div class="absolute inset-0 overflow-hidden">
      <!-- Large bubbles -->
      <div
        class="absolute -top-40 -right-40 w-80 h-80 rounded-full bg-white opacity-10 floating-animation"
      ></div>
      <div
        class="absolute -bottom-40 -left-40 w-96 h-96 rounded-full bg-white opacity-5 floating-animation"
        style="animation-delay: -3s"
      ></div>
      <div
        class="absolute top-1/4 left-1/4 w-64 h-64 rounded-full bg-white opacity-5 floating-animation"
        style="animation-delay: -1.5s"
      ></div>

      <!-- Medium bubbles -->
      <div
        class="absolute top-10 left-1/3 w-48 h-48 rounded-full bg-white opacity-8 floating-animation"
        style="animation-delay: -2s"
      ></div>
      <div
        class="absolute bottom-20 right-1/4 w-56 h-56 rounded-full bg-white opacity-6 floating-animation"
        style="animation-delay: -4s"
      ></div>
      <div
        class="absolute top-1/2 -left-20 w-40 h-40 rounded-full bg-white opacity-7 floating-animation"
        style="animation-delay: -1s"
      ></div>
      <div
        class="absolute top-3/4 right-10 w-44 h-44 rounded-full bg-white opacity-5 floating-animation"
        style="animation-delay: -2.5s"
      ></div>

      <!-- Small bubbles -->
      <div
        class="absolute top-1/6 right-1/3 w-24 h-24 rounded-full bg-white opacity-12 floating-animation"
        style="animation-delay: -0.5s"
      ></div>
      <div
        class="absolute bottom-1/3 left-1/6 w-32 h-32 rounded-full bg-white opacity-8 floating-animation"
        style="animation-delay: -3.5s"
      ></div>
      <div
        class="absolute top-2/3 left-1/2 w-20 h-20 rounded-full bg-white opacity-10 floating-animation"
        style="animation-delay: -1.8s"
      ></div>
      <div
        class="absolute bottom-1/6 right-1/6 w-28 h-28 rounded-full bg-white opacity-6 floating-animation"
        style="animation-delay: -4.2s"
      ></div>

      <!-- Tiny bubbles -->
      <div
        class="absolute top-1/5 left-1/12 w-16 h-16 rounded-full bg-white opacity-15 floating-animation"
        style="animation-delay: -0.8s"
      ></div>
      <div
        class="absolute top-3/5 right-1/12 w-12 h-12 rounded-full bg-white opacity-18 floating-animation"
        style="animation-delay: -2.2s"
      ></div>
      <div
        class="absolute bottom-1/4 left-2/3 w-18 h-18 rounded-full bg-white opacity-12 floating-animation"
        style="animation-delay: -3.8s"
      ></div>
      <div
        class="absolute top-1/8 right-2/5 w-14 h-14 rounded-full bg-white opacity-16 floating-animation"
        style="animation-delay: -1.2s"
      ></div>
      <div
        class="absolute bottom-3/5 left-1/5 w-22 h-22 rounded-full bg-white opacity-9 floating-animation"
        style="animation-delay: -4.5s"
      ></div>
      <div
        class="absolute top-4/5 right-3/5 w-10 h-10 rounded-full bg-white opacity-20 floating-animation"
        style="animation-delay: -0.3s"
      ></div>

      <!-- Extra tiny decorative bubbles -->
      <div
        class="absolute top-1/12 left-3/4 w-8 h-8 rounded-full bg-white opacity-25 floating-animation"
        style="animation-delay: -1.7s"
      ></div>
      <div
        class="absolute bottom-1/12 right-4/5 w-6 h-6 rounded-full bg-white opacity-30 floating-animation"
        style="animation-delay: -3.3s"
      ></div>
      <div
        class="absolute top-5/6 left-1/8 w-9 h-9 rounded-full bg-white opacity-22 floating-animation"
        style="animation-delay: -2.8s"
      ></div>
      <div
        class="absolute bottom-2/3 right-1/8 w-7 h-7 rounded-full bg-white opacity-28 floating-animation"
        style="animation-delay: -0.1s"
      ></div>
    </div>

    <!-- Main Login Card -->
    <div
      class="glass-effect rounded-3xl p-8 w-full max-w-md relative z-10 hover-scale"
    >
      <!-- Logo/Icon -->
      <div class="text-center mb-8">
        <div
          class="w-20 h-20 bg-white rounded-2xl mx-auto p-1 mb-4 flex items-center justify-center shadow-lg"
        >
          <img src="../public/img/icon.png" alt="icon" />
        </div>
        <h1 class="text-3xl font-bold text-white mb-2">Selamat Datang</h1>
        <p class="text-white/80 text-sm">
          Masuk dengan akun Google Anda untuk melanjutkan
        </p>
      </div>

      <!-- Login Form -->
      <div class="space-y-6">
        <!-- Google Login Button -->
        <button
          class="google-btn w-full py-4 px-6 rounded-2xl font-semibold flex items-center justify-center space-x-3 group"
        >
          <svg class="w-6 h-6" viewBox="0 0 24 24">
            <path
              fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            />
            <path
              fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            />
            <path
              fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            />
            <path
              fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            />
          </svg>
          <span>Masuk dengan Google</span>
          <svg
            class="w-5 h-5 group-hover:translate-x-1 transition-transform"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 5l7 7-7 7"
            />
          </svg>
        </button>

        <!-- Divider -->
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-white/20"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-transparent text-white/60">atau</span>
          </div>
        </div>

        <!-- Alternative Options -->
        <div class="flex space-x-4">
          <button
            class="flex-1 glass-effect border border-white/20 py-3 px-4 rounded-xl text-white/80 hover:text-white hover:bg-white/10 transition-all duration-300 flex items-center justify-center space-x-2"
          >
            <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 48 48">
              <path
                d="M38.0766847,15.8542954 C36.0693906,15.7935177 34.2504839,14.8341149 32.8791434,13.5466056 C32.1316475,12.8317108 31.540171,11.9694126 31.1415066,11.0151329 C30.7426093,10.0603874 30.5453728,9.03391952 30.5619062,8 L24.9731521,8 L24.9731521,28.8295196 C24.9731521,32.3434487 22.8773693,34.4182737 20.2765028,34.4182737 C19.6505623,34.4320127 19.0283477,34.3209362 18.4461858,34.0908659 C17.8640239,33.8612612 17.3337909,33.5175528 16.8862248,33.0797671 C16.4386588,32.6422142 16.0833071,32.1196657 15.8404292,31.5426268 C15.5977841,30.9658208 15.4727358,30.3459348 15.4727358,29.7202272 C15.4727358,29.0940539 15.5977841,28.4746337 15.8404292,27.8978277 C16.0833071,27.3207888 16.4386588,26.7980074 16.8862248,26.3604545 C17.3337909,25.9229017 17.8640239,25.5791933 18.4461858,25.3491229 C19.0283477,25.1192854 19.6505623,25.0084418 20.2765028,25.0219479 C20.7939283,25.0263724 21.3069293,25.1167239 21.794781,25.2902081 L21.794781,19.5985278 C21.2957518,19.4900128 20.7869423,19.436221 20.2765028,19.4380839 C18.2431278,19.4392483 16.2560928,20.0426009 14.5659604,21.1729264 C12.875828,22.303019 11.5587449,23.9090873 10.7814424,25.7878401 C10.003907,27.666593 9.80084889,29.7339663 10.1981162,31.7275214 C10.5953834,33.7217752 11.5748126,35.5530237 13.0129853,36.9904978 C14.4509252,38.4277391 16.2828722,39.4064696 18.277126,39.8028054 C20.2711469,40.1991413 22.3382874,39.9951517 24.2163416,39.2169177 C26.0948616,38.4384508 27.7002312,37.1209021 28.8296253,35.4300711 C29.9592522,33.7397058 30.5619062,31.7522051 30.5619062,29.7188301 L30.5619062,18.8324027 C32.7275484,20.3418321 35.3149087,21.0404263 38.0766847,21.0867664 L38.0766847,15.8542954 Z"
              ></path>
            </svg>
            <span class="text-sm">Tiktok</span>
          </button>
          <button
            class="flex-1 glass-effect border border-white/20 py-3 px-4 rounded-xl text-white/80 hover:text-white hover:bg-white/10 transition-all duration-300 flex items-center justify-center space-x-2"
          >
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path
                d="M13.795 10.533 20.68 2h-3.073l-5.255 6.517L7.69 2H1l7.806 10.91L1.47 22h3.074l5.705-7.07L15.31 22H22l-8.205-11.467Zm-2.38 2.95L9.97 11.464 4.36 3.627h2.31l4.528 6.317 1.443 2.02 6.018 8.409h-2.31l-4.934-6.89Z"
              />
            </svg>

            <span class="text-sm">Twitter</span>
          </button>
        </div>
      </div>

      <!-- Footer -->
      <div class="mt-8 text-center">
        <p class="text-white/60 text-xs">
          Dengan masuk, Anda menyetujui
          <a href="#" class="text-white hover:underline">Syarat & Ketentuan</a>
          dan
          <a href="#" class="text-white hover:underline">Kebijakan Privasi</a>
        </p>
      </div>
    </div>

    <!-- Powered by JKIND - Bottom Right -->
    <div class="fixed bottom-4 right-4 z-20">
      <div
        class="flex items-center space-x-2 glass-effect px-4 py-2 rounded-full hover-scale"
      >
        <span class="text-white/70 text-sm font-medium">Powered by</span>
        <img
          src="../public/img/jkind.png"
          alt="JKIND"
          class="h-6 w-auto filter brightness-0 invert opacity-80 hover:opacity-100 transition-opacity duration-300"
        />
      </div>
    </div>
    <script type="module" src="script.js"></script>
  </body>
</html>
